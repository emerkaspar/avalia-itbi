<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalia ITBI - Gestão Imobiliária</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3>Avalia ITBI</h3>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="nav-item active" data-target="secao-itbi"><i class="fas fa-file-invoice-dollar"></i> Registro de ITBI</a></li>
                <li><a href="#" class="nav-item" data-target="secao-hectares"><i class="fas fa-map-marked-alt"></i> Valores por Hectare</a></li>
            </ul>
        </nav>

        <main class="content">
            
            <section id="secao-itbi" class="tab-content active">
                <h2><i class="fas fa-calculator"></i> Registro de Avaliação ITBI</h2>
                <div class="card">
                    <div class="grid-form">
                        <div class="form-group">
                            <label>Ano da Avaliação:</label>
                            <input type="number" id="ano" placeholder="Ex: 2024">
                        </div>
                        <div class="form-group">
                            <label>Bairro/Localidade:</label>
                            <input type="text" id="bairro" placeholder="Ex: Centro">
                        </div>
                        <div class="form-group">
                            <label>Área (m²):</label>
                            <input type="number" id="area" placeholder="Ex: 150">
                        </div>
                        <div class="form-group">
                            <label>Valor Avaliado (R$):</label>
                            <input type="number" id="valor" placeholder="Ex: 350000">
                        </div>
                    </div>
                    <button id="btnSalvarITBI" class="btn-primary">Salvar Avaliação</button>
                </div>

                <div class="card mt-20">
                    <h3>Histórico de Avaliações</h3>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ano</th>
                                    <th>Bairro</th>
                                    <th>Área</th>
                                    <th>Valor Total</th>
                                    <th>Valor/m²</th>
                                    <th style="width: 120px;">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaITBI"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="secao-hectares" class="tab-content">
                <h2><i class="fas fa-map-marked-alt"></i> Valores de Referência por Hectare</h2>
                <div class="card">
                    <div class="grid-form">
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Nome da Localidade:</label>
                            <input type="text" id="loc-nome" placeholder="Ex: Linha Santa Cruz">
                        </div>
                        <div class="form-group">
                            <label>Valor por Hectare (R$):</label>
                            <input type="number" id="loc-valor" placeholder="Ex: 80000">
                        </div>
                    </div>
                    <button id="btnSalvarHectare" class="btn-secondary">Cadastrar Localidade</button>
                </div>

                <div class="card mt-20">
                    <h3>Tabela de Preços por Localidade</h3>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Localidade</th>
                                    <th>Valor/Hectare</th>
                                    <th style="width: 120px;">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaHectares"></tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
